apiVersion: 1

# Пересоздать DS с uid=prometheus (иначе дашборды с uid prometheus пустые)
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
