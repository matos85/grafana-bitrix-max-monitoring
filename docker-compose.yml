# Grafana + Prometheus + Bitrix24 OAuth (LAN).
# Запуск: docker compose --env-file .env up -d --build

name: monitoring

services:
  mysql:
    image: mysql:8.4
    container_name: monitoring-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?задайте MYSQL_ROOT_PASSWORD в .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-grafana}
      MYSQL_USER: ${MYSQL_USER:-grafana}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?задайте MYSQL_PASSWORD в .env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - monitoring

  max-metrics:
    build: ./max-metrics
    container_name: monitoring-max-metrics
    restart: unless-stopped
    ports:
      - "${MAX_METRICS_BIND:-0.0.0.0}:${MAX_METRICS_PORT:-9093}:8080"
    environment:
      MAX_METRICS_API_KEY: ${MAX_METRICS_API_KEY:-}
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: monitoring-prometheus
    restart: unless-stopped
    depends_on:
      - max-metrics
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring

  oauth-bridge:
    build: ./oauth-bridge
    container_name: monitoring-oauth-bridge
    restart: unless-stopped
    env_file: .env
    ports:
      - "${OAUTH_BRIDGE_BIND:-0.0.0.0}:${OAUTH_BRIDGE_PORT:-4181}:8080"
    environment:
      OAUTH_BRIDGE_PUBLIC_URL: ${OAUTH_BRIDGE_PUBLIC_URL:?задайте OAUTH_BRIDGE_PUBLIC_URL в .env}
      OAUTH_BRIDGE_CLIENT_ID: ${OAUTH_BRIDGE_CLIENT_ID:?задайте OAUTH_BRIDGE_CLIENT_ID в .env}
      OAUTH_BRIDGE_CLIENT_SECRET: ${OAUTH_BRIDGE_CLIENT_SECRET:?задайте OAUTH_BRIDGE_CLIENT_SECRET в .env}
      BITRIX_CLIENT_ID: ${BITRIX_CLIENT_ID:-}
      BITRIX_CLIENT_SECRET: ${BITRIX_CLIENT_SECRET:-}
      BITRIX_AUTH_BASE_URL: ${BITRIX_AUTH_BASE_URL:?задайте BITRIX_AUTH_BASE_URL в .env}
      BITRIX_TOKEN_URL: ${BITRIX_TOKEN_URL:?задайте BITRIX_TOKEN_URL в .env}
      BITRIX_REST_BASE: ${BITRIX_REST_BASE:?задайте BITRIX_REST_BASE в .env}
      BITRIX_OAUTH_SCOPE: ${BITRIX_OAUTH_SCOPE:-user,user_brief,profile,auth}
      GRAFANA_ROOT_URL: ${GRAFANA_ROOT_URL:?задайте GRAFANA_ROOT_URL в .env}
      PROMETHEUS_PUBLIC_URL: ${PROMETHEUS_PUBLIC_URL:?задайте PROMETHEUS_PUBLIC_URL в .env}
      OAUTH_EMAIL_DOMAIN: ${OAUTH_EMAIL_DOMAIN:-local}
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:12.0.0
    container_name: monitoring-grafana
    env_file: .env
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      prometheus:
        condition: service_started
      max-metrics:
        condition: service_started
      oauth-bridge:
        condition: service_started
    ports:
      - "${GRAFANA_BIND:-0.0.0.0}:${GRAFANA_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:?задайте GF_ADMIN_USER в .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?задайте GF_ADMIN_PASSWORD в .env}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?задайте GRAFANA_ROOT_URL в .env}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:?задайте GRAFANA_DOMAIN в .env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "${GF_AUTH_DISABLE_LOGIN_FORM:-false}"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Bitrix24
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${OAUTH_BRIDGE_CLIENT_ID}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${OAUTH_BRIDGE_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://oauth-bridge:8080/oauth/token
      GF_AUTH_GENERIC_OAUTH_API_URL: http://oauth-bridge:8080/userinfo
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "false"
      GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN: "false"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: name
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "false"
      GF_AUTH_SIGNOUT_REDIRECT_URL: ${GRAFANA_ROOT_URL:?задайте GRAFANA_ROOT_URL в .env}
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: ${OAUTH_BRIDGE_PUBLIC_URL:?задайте OAUTH_BRIDGE_PUBLIC_URL в .env}/oauth/authorize
      GF_USERS_ALLOW_SIGN_UP: "true"
      GF_USERS_VERIFY_EMAIL_ENABLED: "false"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP: "true"
      GF_USERS_DEFAULT_THEME: dark
      GF_USERS_DEFAULT_LANGUAGE: ru-RU
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/home.json
      GF_DATABASE_TYPE: mysql
      GF_DATABASE_HOST: mysql:3306
      GF_DATABASE_NAME: ${MYSQL_DATABASE:-grafana}
      GF_DATABASE_USER: ${MYSQL_USER:-grafana}
      GF_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/locales/ru-RU:/usr/share/grafana/public/locales/ru-RU:ro
    networks:
      - monitoring

  grafana-init:
    image: curlimages/curl:8.11.1
    container_name: monitoring-grafana-init
    env_file: .env
    depends_on:
      - grafana
    restart: "no"
    environment:
      GRAFANA_URL: http://grafana:3000
      GF_ADMIN_USER: ${GF_ADMIN_USER:?задайте GF_ADMIN_USER в .env}
      GF_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?задайте GF_ADMIN_PASSWORD в .env}
      GF_VIEWER_USER: ${GF_VIEWER_USER:-viewer}
      GF_VIEWER_PASSWORD: ${GF_VIEWER_PASSWORD:?задайте GF_VIEWER_PASSWORD в .env}
      GF_VIEWER_EMAIL: ${GF_VIEWER_EMAIL:-viewer@local}
    volumes:
      - ./scripts/grafana-init-users.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - monitoring

  oauth2-proxy-prometheus:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: monitoring-oauth2-proxy
    restart: unless-stopped
    depends_on:
      - prometheus
      - oauth-bridge
    ports:
      - "${PROMETHEUS_PUBLIC_BIND:-0.0.0.0}:${PROMETHEUS_PUBLIC_PORT:-9092}:4180"
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: http://prometheus:9090
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:?set OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH_BRIDGE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH_BRIDGE_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: ${PROMETHEUS_PUBLIC_URL:?задайте PROMETHEUS_PUBLIC_URL в .env}/oauth2/callback
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH_BRIDGE_PUBLIC_URL:?задайте OAUTH_BRIDGE_PUBLIC_URL в .env}
      OAUTH2_PROXY_LOGIN_URL: ${OAUTH_BRIDGE_PUBLIC_URL:?задайте OAUTH_BRIDGE_PUBLIC_URL в .env}/oauth/authorize
      OAUTH2_PROXY_REDEEM_URL: http://oauth-bridge:8080/oauth/token
      OAUTH2_PROXY_PROFILE_URL: http://oauth-bridge:8080/userinfo
      OAUTH2_PROXY_OIDC_JWKS_URL: http://oauth-bridge:8080/.well-known/jwks.json
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  mysql_data:
  grafana_data:
    name: monitoring_grafana_ru_data
